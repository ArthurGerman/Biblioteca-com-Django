{% extends 'myapp/base.html' %}
{% block content %}
<h1>Autores</h1>
<a href="{% url 'autor-create' %}">Novo Autor</a><br><br>




<table border="2">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th colspan="3">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for autor in autores %}
            <tr>
                <td>{{ autor.nome }}</td>
                <td>{{ autor.email }}</td>

                <td>
                    <a href="{% url 'autor-detail' autor.pk %}">Detalhes</a> 
                </td>
                <td>
                    <a href="{% url 'autor-update' autor.pk %}">Editar</a>
                </td>
                <td>
                    <a href="{% url 'autor-delete' autor.pk %}">Deletar</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="4">Nenhum autor cadastrado.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
