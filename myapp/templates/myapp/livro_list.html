{% extends 'myapp/base.html' %}
{% block content %}

<h1>Livros</h1>
<a href="{% url 'livro-create' %}">Novo livro</a><br><br>

<table border="2">
  <thead>
    <tr>
      <th>Título</th>
      <th>Autor</th>
      <th>Publicado em</th>
      <th colspan="3">Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for livro in livros %}
        <tr>
            <td>
                {{ livro.titulo }}
            </td>
            <td>
                <a href="{% url 'autor-detail' livro.autor.pk %}">
                {{ livro.autor.nome }}
                </a>
            </td>
            <td>
                {{ livro.ano_publicacao }}
            </td>
            <td>
                <a href="{% url 'livro-detail' livro.pk %}">Detalhes</a>
            </td>
            <td>
                <a href="{% url 'livro-update' livro.pk %}">Editar</a>
            </td>
            <td>
                <a href="{% url 'livro-delete' livro.pk %}">Deletar</a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="4">Nenhum livro cadastrado.</td>
        </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
