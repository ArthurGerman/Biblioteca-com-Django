{% extends 'myapp/base.html' %}
{% block content %}

<h1>Deletar livro</h1>

<p>
  Tem certeza que deseja deletar
  <strong>{{ object.titulo }}</strong>
  de {{ object.autor.nome }}?
</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Confirmar exclusão</button>
  <a href="{% url 'livro-list' %}">Cancelar</a>
</form>

{% endblock %}
